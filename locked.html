<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEXUS | Encrypted Sector</title>
    <style>
        :root { --red: #ff0033; --black: #050505; --dim: rgba(255, 0, 51, 0.1); }
        body { background-color: var(--black); color: #fff; font-family: 'Courier New', monospace; margin: 0; text-align: center; overflow: hidden; }
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(var(--dim) 1px, transparent 1px), linear-gradient(90deg, var(--dim) 1px, transparent 1px); background-size: 35px 35px; z-index: -1; opacity: 0.4; }
        header { background: #000; padding: 20px; border-bottom: 2px solid var(--red); box-shadow: 0 0 15px var(--red); }
        .logo { color: var(--red); font-size: 24px; letter-spacing: 5px; text-transform: uppercase; font-weight: 900; }
        .container { max-width: 650px; margin: 60px auto; background: rgba(0,0,0,0.9); border: 1px solid #333; padding: 30px; text-align: left; }
        h1 { color: #fff; font-size: 24px; text-transform: uppercase; margin: 0; letter-spacing: 3px; }
        .glitch { animation: glitch 1.2s infinite; }
        @keyframes glitch { 2%, 64% { transform: translate(3px, 0); } 4%, 60% { transform: translate(-3px, 0); } }
        .status { margin-top: 25px; padding: 15px; border-left: 2px solid var(--red); background: #0a0a0a; font-size: 13px; color: #00ff41; }
        .btn { display: inline-block; margin-top: 35px; padding: 12px 35px; border: 1px solid var(--red); color: var(--red); text-decoration: none; font-size: 12px; transition: 0.3s; cursor: pointer; }
        .btn:hover { background: var(--red); color: #fff; box-shadow: 0 0 20px var(--red); }
    </style>
    <script>window.history.replaceState(null, '', 'https://classroom.google.com');</script>
</head>
<body>
    <header><div class="logo">NEXUS // CORE</div></header>
    <div class="container">
        <h1 class="glitch">Access Denied</h1>
        <div class="status">
            > FIREWALL: ACTIVE<br>
            > ENCRYPTION: LEVEL_9<br>
            <span style="color:var(--red)">> ERROR: UNAUTHORIZED_CLEARANCE</span>
        </div>
        <p style="color: #666; font-size: 12px; margin-top: 25px;">You have reached a restricted data node. Automated session termination is pending.</p>
        <a onclick="window.location.replace('index.html')" class="btn">RETURN_TO_CORE</a>
    </div>
</body>
</html>
