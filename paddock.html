<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEXUS | Uplink Hub</title>
    <style>
        :root { --red: #ff0033; --black: #050505; --card: #0f0f0f; }
        body { background: var(--black); color: #fff; font-family: 'Courier New', monospace; margin: 0; text-align: center; }
        header { padding: 25px; border-bottom: 2px solid var(--red); background: #000; box-shadow: 0 0 15px var(--red); }
        .logo { color: var(--red); font-size: 24px; letter-spacing: 5px; font-weight: 900; }
        .grid { display: flex; justify-content: center; flex-wrap: wrap; padding: 50px; gap: 25px; }
        .card { width: 300px; background: var(--card); border: 1px solid #222; border-radius: 4px; transition: 0.4s; text-align: left; }
        .card:hover { border-color: var(--red); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255,0,51,0.2); }
        .card-inner { padding: 20px; }
        .tag { color: var(--red); font-size: 10px; margin-bottom: 5px; display: block; letter-spacing: 1px; }
        .card-title { font-weight: bold; font-size: 18px; margin-bottom: 15px; display: block; letter-spacing: 1px; }
        .play-btn { display: block; padding: 15px; background: #000; color: var(--red); text-decoration: none; text-align: center; font-weight: bold; border-top: 1px solid #222; transition: 0.3s; font-size: 12px; }
        .card:hover .play-btn { background: var(--red); color: #fff; }
    </style>
    <script>window.history.replaceState(null, '', 'https://classroom.google.com');</script>
</head>
<body>
    <header><div class="logo">NEXUS // PADDOCK</div></header>
    <div class="grid">
        <div class="card">
            <div class="card-inner"><span class="tag">NODE_ALPHA</span><span class="card-title">1v1.LOL</span></div>
            <a href="https://google.com" class="play-btn">ESTABLISH UPLINK</a>
        </div>
        <div class="card">
            <div class="card-inner"><span class="tag">NODE_BETA</span><span class="card-title">DRIVE MAD</span></div>
            <a href="https://mimo.run" class="play-btn">ESTABLISH UPLINK</a>
        </div>
    </div>
    <a href="index.html" style="color:#444; text-decoration:none; font-size:11px;">[ RETURN_TO_CORE ]</a>
</body>
</html>
